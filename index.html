<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria GOD MODE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('https://xatimg.com/image/2z709uX4q7li.gif') center/cover fixed;
  color: white;
}

/* BOTÕES TOPO */
.top-menu {
  text-align: center;
  padding: 10px;
}

.top-menu button {
  margin: 5px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(45deg,#00ffff,#0077ff);
  font-weight: bold;
}

/* JANELAS */
.window {
  display: none;
  padding: 20px;
}

.window.active {
  display: block;
  animation: fade 0.4s;
}

@keyframes fade {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1;}
}

/* GALERIA */
.netflix-container {
  width: 932px;
  height: 235px;
  display: flex;
  flex-wrap: wrap;
  overflow-y: auto;
  gap: 15px;
  padding: 10px;
  margin: auto;
  background: rgba(0,0,0,0.6);
  border-radius: 15px;
}

/* CARD */
.card {
  width: 180px;
  height: 120px;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  border: 2px solid rgba(0,255,255,0.5);
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}

/* PREVIEW ANIMADO */
.card:hover img {
  transform: scale(1.2) rotate(1deg);
  filter: brightness(1.2);
}

/* FAVORITO */
.fav-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  cursor: pointer;
}
.fav-btn.active { color: red; }

/* MODAL */
#modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#modalImg {
  width: 1107px;
  height: 678px;
  object-fit: cover;
}

.close-btn {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  cursor: pointer;
}

/* PERFILS */
.profile-card {
  width: 150px;
  text-align: center;
}

.profile-card img {
  width: 100px;
  border-radius: 50%;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="top-menu">
  <button onclick="openWindow('gallery')">GALERIA</button>
  <button onclick="openWindow('pcback')">PCBACK</button>
  <button onclick="openWindow('perfils')">PERFILS</button>
</div>

<!-- GALERIA -->
<div id="gallery" class="window active">

<input type="text" id="searchInput" placeholder="🔍 Buscar...">

<div>
<button onclick="filterCategory('all')">TODOS</button>
<button onclick="filterCategory('gif')">GIF</button>
<button onclick="filterCategory('hd')">HD</button>
<button onclick="filterCategory('dark')">DARK</button>
<button onclick="filterCategory('neon')">NEON</button>
</div>

<div class="netflix-container" id="netflixList"></div>

</div>

<!-- PCBACK -->
<div id="pcback" class="window">
  <h2>PCBACK</h2>
  <p>Aqui você pode colocar configs, downloads ou wallpapers exclusivos 🔥</p>
</div>

<!-- PERFILS -->
<div id="perfils" class="window">
  <h2>Perfils</h2>

  <div style="display:flex; gap:20px; justify-content:center;">
    <div class="profile-card">
      <img src="https://i.pravatar.cc/150?img=1">
      <p>User 1</p>
    </div>

    <div class="profile-card">
      <img src="https://i.pravatar.cc/150?img=2">
      <p>User 2</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <span class="close-btn" onclick="closeModal()">✕</span>
  <img id="modalImg">
</div>

<script>
// IMAGENS
const imagens = [
{src:"https://xatimg.com/image/LhPTjinBD63k.png", cat:"neon"},
{src:"https://xatimg.com/image/jEluPHc8kDBS.png", cat:"dark"},
{src:"https://xatimg.com/image/M5KeuOtU2NpC.png", cat:"hd"},
{src:"https://xatimg.com/image/4jN5TkdSc7x2.png", cat:"gif"}
];

// RENDER
function renderImages(list){
  const container = document.getElementById("netflixList");
  container.innerHTML = "";

  list.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.src}" onclick="openModal('${item.src}')">
        <button class="fav-btn" onclick="toggleFav(this,'${item.src}')">❤</button>
      </div>
    `;
  });
}
renderImages(imagens);

// BUSCA
document.getElementById("searchInput").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();
  renderImages(imagens.filter(i=>i.src.includes(val)));
});

// CATEGORIA
function filterCategory(cat){
  if(cat==="all") return renderImages(imagens);
  renderImages(imagens.filter(i=>i.cat===cat));
}

// JANELAS
function openWindow(id){
  document.querySelectorAll(".window").forEach(w=>w.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  playClick();
}

// MODAL
function openModal(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=src;
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

// FAVORITO
function toggleFav(btn,img){
  let favs=JSON.parse(localStorage.getItem("favs"))||[];
  if(favs.includes(img)){
    favs=favs.filter(f=>f!==img);
    btn.classList.remove("active");
  } else {
    favs.push(img);
    btn.classList.add("active");
  }
  localStorage.setItem("favs",JSON.stringify(favs));
}

// SOM
function playClick(){
  new Audio("https://freesound.org/data/previews/522/522867_11507880-lq.mp3").play();
}
</script>

</body>
</html>
