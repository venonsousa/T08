<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interface Premium</title>
<style>
/* RESET & BODY */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-image: url('https://xatimg.com/image/2z709uX4q7li.gif');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  color: white;
  overflow-x: hidden;
}
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  padding: 20px;
  box-sizing: border-box;
  z-index: 20;
}

.profile { text-align: center; }
.profile img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #00ffff; }

.gradient-text {
  background: linear-gradient(45deg, #00ffff, #0077ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
}

/* BOTÕES */
.menu-btn {
  margin-top: 10px;
  padding: 8px 10px;
  font-size: 14px;
  height: 40px;
  background: linear-gradient(45deg, #00ffff, #0077ff);
  color: black;
  border: none;
  width: 100%;
  border-radius: 15px;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: all 0.4s ease;
}
.menu-btn:hover { transform: scale(1.05); box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff inset; }
.menu-btn .icon { margin-right: 8px; width: 16px; height: 16px; border: 2px solid black; border-radius: 50%; border-left: 3px solid black; animation: spin 1.5s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);} }

/* PAINÉIS */
.panel {
  position: fixed;
  top: 0;
  right: -100%;
  width: calc(100% - 260px);
  height: 100%;
  background: rgba(10,10,10,0.95);
  padding: 30px;
  box-sizing: border-box;
  overflow-y: auto;
  z-index: 15;
  opacity: 0;
  transition: right 0.5s ease, opacity 0.5s ease;
}
.panel.active { right: 0; opacity: 1; }

/* GRID */
.grid { display: flex; flex-wrap: wrap; gap: 15px; counter-reset: card; }
.card {
  position: relative;
  width: 260px;
  height: 218px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  transition: transform 0.3s;
  border: 1px solid rgba(0,255,255,0.2);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  cursor: pointer;
  z-index: 1;
}
.card::before {
  counter-increment: card;
  content: "#" counter(card);
  position: absolute;
  top: 10px;
  left: 15px;
  font-size: 14px;
  color: #00ffff;
  font-weight: bold;
  background: rgba(0,255,255,0.1);
  padding: 5px 10px;
  border-radius: 10px;
}
.card:hover { transform: scale(1.05); z-index: 999; }
/* Ajuste imagens dos cards */
.card img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; }

/* MODAL */
#modal {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}
#modal img { width: 80%; max-width: 1088px; height: auto; border-radius: 10px; object-fit: cover; }
#modal .close-btn { position: absolute; top: 20px; right: 30px; font-size: 28px; color: white; cursor: pointer; font-weight: bold; }

/* QUADRADO CENTRAL */
#main-card {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 700px;
  height: 500px;
  background: rgba(0,0,0,0.8);
  border-radius: 20px;
  padding: 20px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 25;
}

/* MENU INTERNO */
#inner-menu { display: flex; gap: 15px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
.menu-option {
  background: linear-gradient(45deg, #00ffff, #0077ff);
  border: none;
  color: black;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s ease;
}
.menu-option:hover { transform: scale(1.05); box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff inset; }

/* CONTEÚDO DO CARD */
#card-content { display: flex; justify-content: space-around; align-items: center; gap: 20px; flex: 1; flex-wrap: wrap; }

/* PAINÉIS INTERNOS */
.menu-panel { display: none; background: rgba(0,255,255,0.05); padding: 15px; border-radius: 15px; flex: 1; max-height: 450px; overflow-y: auto; color: #00ffff; min-width: 280px; }
.menu-panel.active { display: block; }

/* FRIEND GRID */
.friend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 10px;
  justify-items: center;
  align-items: center;
}
.friend-grid div {
  width: 70px;
  height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s;
}
.friend-grid img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #00ffff; }
.friend-grid span { margin-top: 5px; font-weight: bold; color: #00ffff; text-align: center; }

/* RODAPÉ */
footer {
  position: fixed;
  bottom: 0;
  left: 260px;
  width: calc(100% - 260px);
  text-align: center;
  padding: 10px 0;
  background: rgba(0,0,0,0.6);
  font-size: 14px;
  box-sizing: border-box;
}
footer a { color: #00ffff; text-decoration: none; }

/* RESPONSIVO */
@media (max-width: 768px) {
  .sidebar { width: 100%; height: auto; position: relative; display: flex; flex-direction: row; justify-content: space-around; padding: 10px; }
  footer { left: 0; width: 100%; }
  #main-card { width: 95%; height: auto; top: 60%; transform: translate(-50%, -50%); padding: 10px; }
  #card-content { flex-direction: column; gap: 15px; }
  #inner-menu { flex-direction: column; gap: 10px; }
  .menu-panel { min-width: 100%; max-height: 300px; }
  iframe { width: 100% !important; height: 300px !important; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="profile">
    <img src="https://i.pravatar.cc/150">
    <h2 class="gradient-text">iiCarvaozim</h2>
    <p class="gradient-text">Dev • Criador • Designer</p>
  </div>
  <button class="menu-btn" onclick="pcBack();"><div class="icon"></div> VOLTAR AO INÍCIO</button>
  <button class="menu-btn" onclick="openGFS(); playSound();"><div class="icon"></div> FUNDOS GFS</button>
  <button class="menu-btn" onclick="openStatic();"><div class="icon"></div> FUNDOS ESTÁTICOS</button>
</div>

<!-- PAINÉIS -->
<div class="panel" id="panelGFS">
  <button class="menu-btn" onclick="pcBack();"><div class="icon"></div> VOLTAR AO INÍCIO</button>
  <div class="grid">
    <div class="card" id="cardGFS1"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </div>
</div>

<div class="panel" id="panelStatic">
  <button class="menu-btn" onclick="pcBack();"><div class="icon"></div> VOLTAR AO INÍCIO</button>
  <div class="grid">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </div>
</div>

<!-- QUADRADO CENTRAL -->
<div id="main-card">
  <div id="inner-menu">
    <button class="menu-option" onclick="showPanel('about')">Sobre mim</button>
    <button class="menu-option" onclick="showPanel('contact')">Onde me encontrar</button>
    <button class="menu-option" onclick="showPanel('friends-panel')">Amigos</button>
  </div>

  <div id="card-content">
    <div class="table-container" id="spotify-inner">
      <h3 class="gradient-text">Spotify</h3>
      <iframe style="border-radius:12px; border:none;" 
              src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcQyYo9QwAM3" 
              width="300" height="380" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <div id="about" class="menu-panel"><p>iiscarvaozim do xat.com</p></div>
    <div id="contact" class="menu-panel">
      <label for="trade-link">Trade:</label>
      <input type="text" id="trade-link" value="https://xa.com/trade" readonly onclick="this.select()">
    </div>
    <div id="friends-panel" class="menu-panel">
      <h3 class="gradient-text">Meus Amigos</h3>
      <div class="friend-grid">
        <div><img src="https://i.pravatar.cc/120?img=10"><span>Amigo 1</span></div>
        <div><img src="https://i.pravatar.cc/120?img=11"><span>Amigo 2</span></div>
        <div><img src="https://i.pravatar.cc/120?img=12"><span>Amigo 3</span></div>
        <div><img src="https://i.pravatar.cc/120?img=13"><span>Amigo 4</span></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <span class="close-btn" onclick="closeModal()">×</span>
  <img id="modalImg">
</div>

<footer>
  <a href="https://xat.com/conexaosertanejoo" target="_blank">
    Copyright @ - 2026 // Reservado iCarvãozim / Fundos / Pcback / Perfil
  </a>
</footer>

<script>
// SOM
function playSound() {
  const audio = new Audio("https://freesound.org/data/previews/341/341695_6245054-lq.mp3");
  audio.volume = 0.3;
  audio.play();
}

// MENU DE PAINÉIS
function pcBack() {
  document.getElementById("panelGFS").classList.remove("active");
  document.getElementById("panelStatic").classList.remove("active");
  document.getElementById("main-card").style.display = "flex";
}

function openGFS() {
  document.getElementById("panelGFS").classList.add("active");
  document.getElementById("panelStatic").classList.remove("active");
  document.getElementById("main-card").style.display = "none";
  const card = document.getElementById("cardGFS1");
  card.innerHTML = '<img src="https://xatimg.com/image/2z709uX4q7li.gif">';
  card.onclick = function() { openModal("https://xatimg.com/image/2z709uX4q7li.gif"); };
}

function openStatic() {
  document.getElementById("panelStatic").classList.add("active");
  document.getElementById("panelGFS").classList.remove("active");
  document.getElementById("main-card").style.display = "none";
  resetParticlesStatic();
}

// MODAL
function openModal(src) { 
  document.getElementById("modal").style.display = "flex"; 
  document.getElementById("modalImg").src = src; 
}
function closeModal() { document.getElementById("modal").style.display = "none"; }

// MENU INTERNO
function showPanel(panelId) {
  document.querySelectorAll('.menu-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(panelId).classList.add('active');
}
showPanel('about'); // inicial

// CANVAS PARTICULAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

let particles = [];
class Particle { 
  constructor(){ 
    this.x=Math.random()*canvas.width; 
    this.y=Math.random()*canvas.height; 
    this.size=Math.random()*2+1; 
    this.speedX=Math.random()-0.5; 
    this.speedY=Math.random()-0.5;
  } 
  update(){
    this.x+=this.speedX; 
    this.y+=this.speedY; 
    if(this.x>canvas.width)this.x=0;
    if(this.x<0)this.x=canvas.width;
    if(this.y>canvas.height)this.y=0;
    if(this.y<0)this.y=canvas.height;
  } 
  draw(){
    ctx.fillStyle="#00ffff";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}
function initParticles(count=100){particles=[];for(let i=0;i<count;i++)particles.push(new Particle());}
function resetParticlesStatic(count=100){particles=[];for(let i=0;i<count;i++){let p=new Particle();p.speedX=0;p.speedY=0;particles.push(p);}}
function animateParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animateParticles);}
initParticles();
animateParticles();
</script>

</body>
</html>
