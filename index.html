<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Galeria Netflix Style PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  display: flex;
}

/* MENU */
.menu {
  width: 240px;
  background: #141414;
  height: 100vh;
  padding: 20px;
  box-sizing: border-box;
}

/* PERFIL */
.profile {
  text-align: center;
  margin-bottom: 30px;
}

.profile img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid #e50914;
  margin-bottom: 10px;
}

.profile h3 {
  margin: 5px 0;
}

.profile p {
  font-size: 12px;
  color: #aaa;
}

/* BOTÕES */
.menu button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  background: #222;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.3s;
}

.menu button:hover {
  background: #e50914;
}

/* CONTEÚDO */
.content {
  flex: 1;
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 276px);
  gap: 15px;
}

/* CARD */
.card {
  width: 276px;
  height: 232px;
  position: relative;
  overflow: hidden;
  border-radius: 8px;
  cursor: pointer;
}

/* IMAGEM */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
}

/* NUMERO */
.card span {
  position: absolute;
  top: 8px;
  left: 10px;
  background: rgba(0,0,0,0.7);
  padding: 4px 8px;
  border-radius: 4px;
  z-index: 2;
}

/* PLACEHOLDER */
.placeholder {
  width: 100%;
  height: 100%;
  background: #1c1c1c;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #555;
  font-size: 22px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

.modal.active {
  opacity: 1;
  pointer-events: all;
  background: rgba(0,0,0,0.95);
}

.modal img {
  width: 1202px;
  height: 733px;
  object-fit: cover;
  border-radius: 10px;
  transform: scale(0.7);
  opacity: 0;
  transition: 0.4s;
}

.modal.active img {
  transform: scale(1);
  opacity: 1;
}

/* FECHAR */
.close {
  position: absolute;
  top: 30px;
  right: 40px;
  font-size: 30px;
  cursor: pointer;
  opacity: 0;
}

.modal.active .close {
  opacity: 1;
}
</style>
</head>

<body>

<div class="menu">

  <!-- PERFIL -->
  <div class="profile">
    <img src="https://i.imgur.com/2DhmtJ4.png">
    <h3>iiCarvaozim</h3>
    <p>/Design/ 2026</p>
  </div>

  <!-- BOTÕES -->
  <button onclick="trocarPagina('fundos')">Galerias de Fundos</button>
  <button onclick="trocarPagina('pcback')">PCBACK</button>
  <button onclick="trocarPagina('perfils')">Perfils</button>

</div>

<div class="content">
  <h2 id="titulo">Galeria</h2>
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="close" onclick="fechar()">✖</span>
  <img id="imgModal">
</div>

<script>

/* PÁGINAS */
const paginas = {

  fundos: [
    "https://xatimg.com/image/LhPTjinBD63k.png",
    "https://xatimg.com/image/jEluPHc8kDBS.png",
    "https://xatimg.com/image/M5KeuOtU2NpC.png",
    "https://xatimg.com/image/4jN5TkdSc7x2.png",
    "https://xatimg.com/image/lVL1GmAicIdb.png"
  ],

  pcback: [
    "https://xatimg.com/image/jZxk3vbSyvkO.png",
    "https://xatimg.com/image/eNTr7eK5Fzkx.png",
    "https://xatimg.com/image/BMqpZZpgVYRg.png",
    "https://xatimg.com/image/OcDf7xQbS78A.png",
    "https://xatimg.com/image/7XZ05yVGKxLh.png",
    "https://xatimg.com/image/z77euV46c21d.png",
    "https://xatimg.com/image/BduAWc9oW2KY.png",
    "https://xatimg.com/image/wXVGtiwFvtph.png",
    "https://xatimg.com/image/vQZ9oxOZgWDE.png",
    "https://xatimg.com/image/smWJYWh2EbF8.png",
    "https://xatimg.com/image/LHprk6E47qv3.png",
    "https://xatimg.com/image/4N14WUti23Wp.png",
    "https://xatimg.com/image/LySTKBuJfezZ.png",
    "https://xatimg.com/image/yXRojPIaB9rG.jpg",
    "https://xatimg.com/image/vFE2aJvDe9ET.png",
    "https://xatimg.com/image/DJcTgtIiVIKH.jpg",
    "https://xatimg.com/image/PisrchM5XiB4.png",
    "https://xatimg.com/image/8mRaFlDxF33B.png",
    "https://xatimg.com/image/RY0binDJKasq.png"
  ],

  perfils: new Array(6).fill(null)
};

/* TROCAR PÁGINA */
function trocarPagina(nome){
  const grid = document.getElementById("grid");
  const titulo = document.getElementById("titulo");

  grid.innerHTML = "";
  titulo.innerText = nome.toUpperCase();

  paginas[nome].forEach((img, i) => {
    const card = document.createElement("div");
    card.className = "card";

    if(img){
      card.innerHTML = `
        <span>${i + 1}</span>
        <img src="${img}" onclick="abrir('${img}')">
      `;
    } else {
      card.innerHTML = `
        <span>${i + 1}</span>
        <div class="placeholder">CARD</div>
      `;
    }

    grid.appendChild(card);
  });
}

/* MODAL */
function abrir(src){
  document.getElementById("imgModal").src = src;
  document.getElementById("modal").classList.add("active");
}

function fechar(){
  document.getElementById("modal").classList.remove("active");
}

/* FECHAR FORA */
document.getElementById("modal").addEventListener("click", function(e){
  if(e.target.id === "modal"){
    fechar();
  }
});

/* INICIAR */
trocarPagina('fundos');

</script>

</body>
</html>
