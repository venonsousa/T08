<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interface Premium</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  padding: 20px;
  box-sizing: border-box;
}

.profile {
  text-align: center;
}

.profile img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 2px solid #00ffff;
}

.gradient-text {
  background: linear-gradient(45deg, #00ffff, #0077ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
}

/* BOTÕES */
.menu-btn {
  margin-top: 20px;
  padding: 12px;
  background: linear-gradient(45deg, #00ffff, #0077ff);
  color: black;
  border: none;
  width: 100%;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.3s;
}

.menu-btn .icon {
  margin-right: 10px;
  width: 20px;
  height: 20px;
  border: 2px solid black;
  border-radius: 50%;
  border-left: 4px solid black;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

.menu-btn:hover {
  box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff inset;
}

/* PAINÉIS */
.panel {
  position: fixed;
  right: -100%;
  top: 160px; /* abaixo da playlist e amigos */
  width: calc(100% - 260px);
  height: calc(100% - 160px);
  background: rgba(10,10,10,0.95);
  padding: 30px;
  box-sizing: border-box;
  transition: right 0.5s;
  overflow-y: auto;
  z-index: 1;
}

.panel.active {
  right: 0;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  counter-reset: card;
}

.card {
  position: relative;
  width: 260px;
  height: 218px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  transition: transform 0.3s, box-shadow 0.3s;
  border: 1px solid rgba(0,255,255,0.2);
  display: flex;
  justify-content: center;
  align-items: center;
  box-sizing: border-box;
  overflow: hidden;
  cursor: pointer;
}

.card::before {
  counter-increment: card;
  content: "#" counter(card);
  position: absolute;
  top: 10px;
  left: 15px;
  font-size: 14px;
  color: #00ffff;
  font-weight: bold;
  background: rgba(0,255,255,0.1);
  padding: 5px 10px;
  border-radius: 10px;
}

.card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(0,255,255,0.4);
}

.card img {
  max-width: 100%;
  max-height: 100%;
  object-fit: cover;
  border-radius: 10px;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

#modal img {
  width: 1088px;
  height: 661px;
  border-radius: 10px;
  object-fit: cover;
}

#modal .close-btn {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 28px;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

/* PLAYLIST */
#playlist {
  position: fixed;
  top: 0;
  left: 260px;
  width: calc(100% - 260px);
  background: rgba(0,0,0,0.7);
  color: #00ffff;
  padding: 10px;
  box-sizing: border-box;
  z-index: 10;
}

/* AMIGOS */
#amigos {
  position: fixed;
  top: 80px;
  left: 260px;
  width: calc(100% - 260px);
  background: rgba(0,0,0,0.5);
  color: #00ffff;
  padding: 10px;
  box-sizing: border-box;
  z-index: 10;
}

#amigos div {
  display: flex;
  gap: 15px;
}
#amigos div div {
  text-align: center;
}

/* RODAPÉ */
footer {
  position: fixed;
  bottom: 0;
  left: 260px;
  width: calc(100% - 260px);
  text-align: center;
  padding: 10px 0;
  background: rgba(0,0,0,0.6);
  font-size: 14px;
  box-sizing: border-box;
}

footer a {
  color: #00ffff;
  text-decoration: none;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- PLAYLIST -->
<div id="playlist">
  <h3>Playlist</h3>
  <audio controls>
    <source src="musicas/chris_brown_gimme.mp3" type="audio/mpeg">
    <source src="musicas/soweto_tempo_de_aprender.mp3" type="audio/mpeg">
    <source src="musicas/user_yeah.mp3" type="audio/mpeg">
    <source src="musicas/pateta_43_semeador.mp3" type="audio/mpeg">
    Seu navegador não suporta o elemento de áudio.
  </audio>
</div>

<!-- AMIGOS -->
<div id="amigos">
  <h3>Meus Amigos</h3>
  <div>
    <div>
      <img src="https://i.pravatar.cc/50?img=1" style="border-radius:50%; width:50px;height:50px;">
      <br>Amigo 1
    </div>
    <div>
      <img src="https://i.pravatar.cc/50?img=2" style="border-radius:50%; width:50px;height:50px;">
      <br>Amigo 2
    </div>
    <div>
      <img src="https://i.pravatar.cc/50?img=3" style="border-radius:50%; width:50px;height:50px;">
      <br>Amigo 3
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="profile">
    <img src="https://i.pravatar.cc/150" alt="Foto de Perfil">
    <h2 class="gradient-text">iiCarvaozim</h2>
    <p class="gradient-text">Dev • Criador • Designer</p>
  </div>

  <button class="menu-btn" onclick="openGFS(); playSound();">
    <div class="icon"></div> FUNDOS GFS
  </button>

  <button class="menu-btn" onclick="pcBack();">
    <div class="icon"></div> PCBACK
  </button>

  <button class="menu-btn" onclick="openStatic();">
    <div class="icon"></div> FUNDOS ESTÁTICOS
  </button>
</div>

<!-- PAINÉIS -->
<div class="panel" id="panelGFS">
  <div class="grid">
    <div class="card" id="cardGFS1"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
  </div>
</div>

<div class="panel" id="panelStatic">
  <div class="grid">
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <span class="close-btn" onclick="closeModal()">×</span>
  <img id="modalImg" src="">
</div>

<!-- RODAPÉ -->
<footer>
  <a href="https://xat.com/conexaosertanejoo" target="_blank">
    Copyright @ - 2026 // Reservado iCarvãozim / Fundos / Pcback / Perfil
  </a>
</footer>

<script>
// SOM
function playSound() {
  const audio = new Audio("https://freesound.org/data/previews/341/341695_6245054-lq.mp3");
  audio.volume = 0.3;
  audio.play();
}

// PCBACK
function pcBack() {
  document.getElementById("panelGFS").classList.remove("active");
  document.getElementById("panelStatic").classList.remove("active");
}

// FUNDOS GFS
function openGFS() {
  document.getElementById("panelGFS").classList.add("active");
  document.getElementById("panelStatic").classList.remove("active");

  const card = document.getElementById("cardGFS1");
  card.innerHTML = '<img src="https://xatimg.com/image/2z709uX4q7li.gif" alt="GIF Fundos">';
  
  card.onclick = function() {
    openModal("https://xatimg.com/image/2z709uX4q7li.gif");
  };
}

// FUNDOS ESTÁTICOS
function openStatic() {
  document.getElementById("panelStatic").classList.add("active");
  document.getElementById("panelGFS").classList.remove("active");
  resetParticlesStatic();
}

// MODAL
function openModal(src) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = src;
}
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

let particles = [];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 1;
    this.speedX = Math.random() - 0.5;
    this.speedY = Math.random() - 0.5;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x > canvas.width) this.x = 0;
    if (this.x < 0) this.x = canvas.width;
    if (this.y > canvas.height) this.y = 0;
    if (this.y < 0) this.y = canvas.height;
  }
  draw() {
    ctx.fillStyle = "#00ffff";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
  }
}

function initParticles(count = 100) {
  particles = [];
  for (let i = 0; i < count; i++) particles.push(new Particle());
}

function resetParticlesStatic(count = 100) {
  particles = [];
  for (let i = 0; i < count; i++) {
    let p = new Particle();
    p.speedX = 0;
    p.speedY = 0;
    particles.push(p);
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();
</script>

</body>
</html>
