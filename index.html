<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Galeria Netflix Style</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  display: flex;
}

/* MENU LATERAL */
.menu {
  width: 220px;
  background: #141414;
  height: 100vh;
  padding: 20px;
  box-sizing: border-box;
}

.menu h2 {
  margin-bottom: 30px;
}

.menu button {
  width: 100%;
  padding: 12px;
  background: #e50914;
  border: none;
  color: white;
  cursor: pointer;
  font-size: 15px;
  border-radius: 5px;
}

.menu button:hover {
  background: #ff1e26;
}

/* CONTEÚDO */
.content {
  flex: 1;
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 276px);
  gap: 15px;
}

/* CARD */
.card {
  width: 276px;
  height: 232px;
  position: relative;
  overflow: hidden;
  border-radius: 8px;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}

/* ZOOM HOVER */
.card:hover img {
  transform: scale(1.1);
}

/* NUMERO */
.card span {
  position: absolute;
  top: 8px;
  left: 10px;
  background: rgba(0,0,0,0.7);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 14px;
}

/* MODAL BASE */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

/* MODAL ATIVO */
.modal.active {
  opacity: 1;
  pointer-events: all;
  background: rgba(0,0,0,0.95);
}

/* IMAGEM ANIMADA */
.modal img {
  width: 1202px;
  height: 733px;
  object-fit: cover;
  border-radius: 10px;
  transform: scale(0.7);
  opacity: 0;
  transition: 0.4s;
}

.modal.active img {
  transform: scale(1);
  opacity: 1;
}

/* BOTÃO FECHAR */
.close {
  position: absolute;
  top: 30px;
  right: 40px;
  font-size: 30px;
  cursor: pointer;
  color: white;
  opacity: 0;
  transition: 0.3s;
}

.modal.active .close {
  opacity: 1;
}
</style>
</head>

<body>

<div class="menu">
  <h2>Menu</h2>
  <button>Galerias de Fundos</button>
</div>

<div class="content">
  <h2>Galeria</h2>
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="close" onclick="fechar()">✖</span>
  <img id="imgModal">
</div>

<script>
const imagens = [
"https://xatimg.com/image/LhPTjinBD63k.png",
"https://xatimg.com/image/jEluPHc8kDBS.png",
"https://xatimg.com/image/M5KeuOtU2NpC.png",
"https://xatimg.com/image/4jN5TkdSc7x2.png",
"https://xatimg.com/image/lVL1GmAicIdb.png",
"https://xatimg.com/image/mXfIoSoinvlS.png",
"https://xatimg.com/image/8xBvreP1tnhM.png",
"https://xatimg.com/image/nab0xky1W2xS.png",
"https://xatimg.com/image/FsBTPmQof5lm.png",
"https://xatimg.com/image/LhPTjinBD63k.png",
"https://xatimg.com/image/WXLjqP8s9vGC.png",
"https://xatimg.com/image/LhYixIgopzov.png",
"https://xatimg.com/image/QWolp0nO1Cyr.png",
"https://xatimg.com/image/exTtbU6yIvUj.png",
"https://xatimg.com/image/cMRWTKaqMi4D.png",
"https://xatimg.com/image/gBrmjCkiusJR.png",
"https://xatimg.com/image/HkiuA7zSpIe1.jpg",
"https://xatimg.com/image/g3yvu0wIxPXE.jpg",
"https://xatimg.com/image/U6OJG0dKfA7E.png"
];

const grid = document.getElementById("grid");

imagens.forEach((img, i) => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <span>${i + 1}</span>
    <img src="${img}" onclick="abrir('${img}')">
  `;

  grid.appendChild(card);
});

/* ABRIR COM ANIMAÇÃO */
function abrir(src){
  const modal = document.getElementById("modal");
  const img = document.getElementById("imgModal");

  img.src = src;
  modal.classList.add("active");
}

/* FECHAR */
function fechar(){
  const modal = document.getElementById("modal");
  modal.classList.remove("active");
}

/* FECHAR CLICANDO FORA */
document.getElementById("modal").addEventListener("click", function(e){
  if(e.target.id === "modal"){
    fechar();
  }
});
</script>

</body>
</html>
