<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interface INSANA</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('https://xatimg.com/image/2z709uX4q7li.gif') center/cover fixed;
  color: white;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 250px;
  height: 100%;
  background: rgba(0,0,0,0.8);
  padding: 20px;
}

/* BOTÃO */
.menu-btn {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* MAIN */
#main-card {
  margin-left: 260px;
  padding: 20px;
}

/* NETFLIX */
.netflix-row { position: relative; }

.netflix-container {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 10px;
}

.netflix-container::-webkit-scrollbar { display: none; }

/* SETAS */
.arrow {
  position: absolute;
  top: 40%;
  font-size: 30px;
  background: rgba(0,0,0,0.6);
  border: none;
  color: cyan;
  cursor: pointer;
  z-index: 10;
}

.arrow.left { left: 0; }
.arrow.right { right: 0; }

/* CARD */
.card {
  min-width: 220px;
  height: 150px;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}

.card:hover img { transform: scale(1.1); }

/* FAVORITO */
.fav-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  border: none;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  color: white;
  cursor: pointer;
  font-size: 16px;
}

.fav-btn.active { color: red; }

/* MODAL */
#modal {
  display: none;
  position: fixed;
  z-index: 9999;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* IMAGEM GRANDE */
#modalImg {
  width: 1107px;
  height: 678px;
  object-fit: cover;
  border-radius: 10px;
  box-shadow: 0 0 30px cyan;
}

/* FECHAR */
.close-btn {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  color: cyan;
  cursor: pointer;
}

/* DOWNLOAD */
.download-btn {
  margin-top: 10px;
  padding: 10px;
  cursor: pointer;
  background: cyan;
  border: none;
}

/* RESPONSIVO */
@media (max-width: 1200px) {
  #modalImg {
    width: 90%;
    height: auto;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <button class="menu-btn">INÍCIO</button>
</div>

<div id="main-card">

<h2>Fundos Estáticos</h2>

<div class="netflix-row">
<button class="arrow left" onclick="scrollRow(-1)">❮</button>
<button class="arrow right" onclick="scrollRow(1)">❯</button>

<div class="netflix-container" id="netflixList"></div>

</div>
</div>

<!-- MODAL -->
<div id="modal">
  <span class="close-btn" onclick="closeModal()">✕</span>
  <img id="modalImg">
  <a id="downloadLink" download target="_blank">
    <button class="download-btn">BAIXAR</button>
  </a>
</div>

<script>
// LISTA DE IMAGENS
const imagens = [
"https://xatimg.com/image/LhPTjinBD63k.png",
"https://xatimg.com/image/jEluPHc8kDBS.png",
"https://xatimg.com/image/M5KeuOtU2NpC.png",
"https://xatimg.com/image/4jN5TkdSc7x2.png",
"https://xatimg.com/image/lVL1GmAicIdb.png",
"https://xatimg.com/image/mXfIoSoinvlS.png",
"https://xatimg.com/image/8xBvreP1tnhM.png",
"https://xatimg.com/image/nab0xky1W2xS.png",
"https://xatimg.com/image/FsBTPmQof5lm.png",
"https://xatimg.com/image/WXLjqP8s9vGC.png",
"https://xatimg.com/image/LhYixIgopzov.png",
"https://xatimg.com/image/QWolp0nO1Cyr.png",
"https://xatimg.com/image/exTtbU6yIvUj.png",
"https://xatimg.com/image/cMRWTKaqMi4D.png",
"https://xatimg.com/image/gBrmjCkiusJR.png",
"https://xatimg.com/image/HkiuA7zSpIe1.jpg",
"https://xatimg.com/image/g3yvu0wIxPXE.jpg",
"https://xatimg.com/image/U6OJG0dKfA7E.png"
];

// GERAR CARDS
const container = document.getElementById("netflixList");

imagens.forEach(src => {
  container.innerHTML += `
    <div class="card">
      <img src="${src}" onclick="openModal('${src}')">
      <button class="fav-btn" onclick="toggleFav(this, '${src}')">❤</button>
    </div>
  `;
});

// SOM
function playClick(){
  new Audio("https://freesound.org/data/previews/522/522867_11507880-lq.mp3").play();
}

// SCROLL
function scrollRow(dir){
  document.getElementById("netflixList").scrollBy({
    left: dir * 300,
    behavior: 'smooth'
  });
  playClick();
}

// MODAL
function openModal(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=src;
  document.getElementById("downloadLink").href=src;
  playClick();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

// FAVORITOS
function toggleFav(btn, img){
  let favs = JSON.parse(localStorage.getItem("favs")) || [];

  if(favs.includes(img)){
    favs = favs.filter(f => f !== img);
    btn.classList.remove("active");
  } else {
    favs.push(img);
    btn.classList.add("active");
  }

  localStorage.setItem("favs", JSON.stringify(favs));
  playClick();
}

// CARREGAR FAVORITOS
window.onload = () => {
  let favs = JSON.parse(localStorage.getItem("favs")) || [];

  document.querySelectorAll(".fav-btn").forEach(btn => {
    const img = btn.getAttribute("onclick").split("'")[1];
    if(favs.includes(img)){
      btn.classList.add("active");
    }
  });
};
</script>

</body>
</html>
