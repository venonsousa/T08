<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interface Premium</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
  overflow-x: hidden;
}
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  padding: 20px;
  box-sizing: border-box;
  z-index: 20;
}

.profile {
  text-align: center;
}
.profile img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 2px solid #00ffff;
}

.gradient-text {
  background: linear-gradient(45deg, #00ffff, #0077ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
}

/* BOTÕES */
.menu-btn {
  margin-top: 10px;
  padding: 8px 10px;
  font-size: 14px;
  height: 40px;
  background: linear-gradient(45deg, #00ffff, #0077ff);
  color: black;
  border: none;
  width: 100%;
  border-radius: 15px;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: all 0.4s ease;
}

.menu-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff inset;
}

.menu-btn .icon {
  margin-right: 8px;
  width: 16px;
  height: 16px;
  border: 2px solid black;
  border-radius: 50%;
  border-left: 3px solid black;
  animation: spin 1.5s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

/* PAINÉIS */
.panel {
  position: fixed;
  top: 0;
  right: -100%;
  width: calc(100% - 260px);
  height: 100%;
  background: rgba(10,10,10,0.95);
  padding: 30px;
  box-sizing: border-box;
  overflow-y: auto;
  z-index: 15;
  transform: translateX(0);
  opacity: 0;
  transition: right 0.5s ease, opacity 0.5s ease;
}

.panel.active {
  right: 0;
  opacity: 1;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  counter-reset: card;
}

.card {
  position: relative;
  width: 260px;
  height: 218px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  transition: transform 0.3s;
  border: 1px solid rgba(0,255,255,0.2);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  cursor: pointer;
  z-index: 1;
}

.card::before {
  counter-increment: card;
  content: "#" counter(card);
  position: absolute;
  top: 10px;
  left: 15px;
  font-size: 14px;
  color: #00ffff;
  font-weight: bold;
  background: rgba(0,255,255,0.1);
  padding: 5px 10px;
  border-radius: 10px;
}

.card:hover {
  transform: scale(1.05);
  z-index: 999;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

#modal img {
  width: 80%;
  max-width: 1088px;
  height: auto;
  border-radius: 10px;
  object-fit: cover;
}

#modal .close-btn {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 28px;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

/* MAIN GRID */
#main-grid {
  position: fixed;
  top: 0;
  left: 260px;
  width: calc(100% - 260px);
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  z-index: 10;
}

/* TABLES MODERNAS */
.table-container {
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 10;
}

/* AMIGOS */
.friend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 20px;
  justify-items: center;
  align-items: center;
  z-index: 10;
}

.friend-grid div {
  transition: transform 0.3s;
}

.friend-grid div:hover {
  transform: scale(1.05);
}

.friend-grid img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 2px solid #00ffff;
}

.friend-grid span {
  display: block;
  margin-top: 5px;
  color: #00ffff;
  font-weight: bold;
}

/* RODAPÉ */
footer {
  position: fixed;
  bottom: 0;
  left: 260px;
  width: calc(100% - 260px);
  text-align: center;
  padding: 10px 0;
  background: rgba(0,0,0,0.6);
  font-size: 14px;
  box-sizing: border-box;
}

footer a {
  color: #00ffff;
  text-decoration: none;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="profile">
    <img src="https://i.pravatar.cc/150">
    <h2 class="gradient-text">iiCarvaozim</h2>
    <p class="gradient-text">Dev • Criador • Designer</p>
  </div>

  <button class="menu-btn" onclick="pcBack();"><div class="icon"></div> VOLTAR AO INÍCIO</button>
  <button class="menu-btn" onclick="openGFS(); playSound();"><div class="icon"></div> FUNDOS GFS</button>
  <button class="menu-btn" onclick="openStatic();"><div class="icon"></div> FUNDOS ESTÁTICOS</button>
</div>

<!-- MAIN GRID: Spotify + Amigos -->
<div id="main-grid">
  <!-- SPOTIFY -->
  <div class="table-container" id="spotify-container">
    <h3 class="gradient-text">Spotify</h3>
    <iframe style="border-radius:12px; border:none;" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcQyYo9QwAM3?utm_source=generator" width="385" height="464" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>

  <!-- AMIGOS -->
  <div class="table-container" id="amigos-container">
    <h3 class="gradient-text">Meus Amigos</h3>
    <div class="friend-grid">
      <div><img src="https://i.pravatar.cc/120?img=10"><span>Amigo 1</span></div>
      <div><img src="https://i.pravatar.cc/120?img=11"><span>Amigo 2</span></div>
      <div><img src="https://i.pravatar.cc/120?img=12"><span>Amigo 3</span></div>
      <div><img src="https://i.pravatar.cc/120?img=13"><span>Amigo 4</span></div>
    </div>
  </div>
</div>

<!-- PAINÉIS -->
<div class="panel" id="panelGFS">
  <button class="menu-btn" onclick="pcBack();"><div class="icon"></div> VOLTAR AO INÍCIO</button>
  <div class="grid">
    <div class="card" id="cardGFS1"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
  </div>
</div>

<div class="panel" id="panelStatic">
  <button class="menu-btn" onclick="pcBack();"><div class="icon"></div> VOLTAR AO INÍCIO</button>
  <div class="grid">
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <span class="close-btn" onclick="closeModal()">×</span>
  <img id="modalImg">
</div>

<!-- RODAPÉ -->
<footer>
  <a href="https://xat.com/conexaosertanejoo" target="_blank">
    Copyright @ - 2026 // Reservado iCarvãozim / Fundos / Pcback / Perfil
  </a>
</footer>

<script>
// SOM
function playSound() {
  const audio = new Audio("https://freesound.org/data/previews/341/341695_6245054-lq.mp3");
  audio.volume = 0.3;
  audio.play();
}

// FUNÇÕES DE MENU
function pcBack() {
  document.getElementById("panelGFS").classList.remove("active");
  document.getElementById("panelStatic").classList.remove("active");
  document.getElementById("main-grid").style.display = "flex"; // mostra Spotify + Amigos
}

function openGFS() {
  document.getElementById("panelGFS").classList.add("active");
  document.getElementById("panelStatic").classList.remove("active");
  document.getElementById("main-grid").style.display = "none";

  const card = document.getElementById("cardGFS1");
  card.innerHTML = '<img src="https://xatimg.com/image/2z709uX4q7li.gif">';
  card.onclick = function() { openModal("https://xatimg.com/image/2z709uX4q7li.gif"); };
}

function openStatic() {
  document.getElementById("panelStatic").classList.add("active");
  document.getElementById("panelGFS").classList.remove("active");
  document.getElementById("main-grid").style.display = "none";
  resetParticlesStatic();
}

// MODAL
function openModal(src) { 
  document.getElementById("modal").style.display = "flex"; 
  document.getElementById("modalImg").src = src; 
}
function closeModal() { document.getElementById("modal").style.display = "none"; }

// CANVAS PARTICULAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

let particles = [];
class Particle { 
  constructor(){ 
    this.x=Math.random()*canvas.width; 
    this.y=Math.random()*canvas.height; 
    this.size=Math.random()*2+1; 
    this.speedX=Math.random()-0.5; 
    this.speedY=Math.random()-0.5;
  } 
  update(){
    this.x+=this.speedX; 
    this.y+=this.speedY; 
    if(this.x>canvas.width)this.x=0;
    if(this.x<0)this.x=canvas.width;
    if(this.y>canvas.height)this.y=0;
    if(this.y<0)this.y=canvas.height;
  } 
  draw(){
    ctx.fillStyle="#00ffff";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}
function initParticles(count=100){particles=[];for(let i=0;i<count;i++)particles.push(new Particle());}
function resetParticlesStatic(count=100){particles=[];for(let i=0;i<count;i++){let p=new Particle();p.speedX=0;p.speedY=0;particles.push(p);}}
function animateParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animateParticles);}
animateParticles();
</script>
</body>
</html>
