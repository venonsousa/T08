<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria ULTRA Netflix</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('https://xatimg.com/image/2z709uX4q7li.gif') center/cover fixed;
  color: white;
}

/* MENU */
.top-menu {
  text-align: center;
  padding: 10px;
}
.top-menu button {
  margin: 5px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #00ffff;
  color: black;
  font-weight: bold;
}

/* JANELAS */
.window { display: none; padding: 20px; }
.window.active { display: block; }

/* WRAPPER */
.netflix-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* GALERIA */
.netflix-container {
  width: 932px;
  height: 235px;
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 10px;
  scroll-behavior: smooth;
  background: rgba(0,0,0,0.6);
  border-radius: 15px;
}
.netflix-container::-webkit-scrollbar { display: none; }

/* CARD */
.card {
  min-width: 180px;
  height: 120px;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  border: 2px solid rgba(0,255,255,0.4);
  cursor: pointer;
  transition: transform 0.3s ease;
}

.card img,
.card video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* VIDEO */
.card video { display: none; }

.card.playing video { display: block; }
.card.playing img { display: none; }

/* EXPANSÃO */
.card.expand {
  transform: scale(1.4);
  z-index: 20;
}

/* FAVORITO */
.fav-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  cursor: pointer;
}
.fav-btn.active { color: red; }

/* SETAS */
.arrow {
  background: rgba(0,0,0,0.7);
  border: none;
  color: white;
  font-size: 30px;
  cursor: pointer;
  padding: 10px;
  border-radius: 50%;
}

/* DESTAQUE */
.highlight {
  margin-top: 20px;
  display: flex;
  justify-content: center;
}
.highlight img {
  width: 604px;
  height: 370px;
  object-fit: cover;
  border-radius: 15px;
  border: 3px solid gold;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}
#modalImg {
  max-width: 90%;
  max-height: 90%;
}
.close-btn {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  cursor: pointer;
}

/* BUSCA */
#searchInput {
  padding: 10px;
  width: 250px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="top-menu">
  <button onclick="openWindow('gallery')">GALERIA</button>
  <button onclick="openWindow('pcback')">PCBACK</button>
  <button onclick="openWindow('perfils')">PERFILS</button>
</div>

<!-- GALERIA -->
<div id="gallery" class="window active">

<input type="text" id="searchInput" placeholder="🔍 Buscar imagem...">

<div class="netflix-wrapper">
  <button class="arrow" onclick="scrollGallery(-1)">❮</button>
  <div class="netflix-container" id="netflixList"></div>
  <button class="arrow" onclick="scrollGallery(1)">❯</button>
</div>

<!-- DESTAQUE -->
<div class="highlight">
  <img id="highlightImg" src="https://xatimg.com/image/jZxk3vbSyvkO.png">
</div>

</div>

<!-- PCBACK -->
<div id="pcback" class="window">
  <h2>PCBACK</h2>
</div>

<!-- PERFILS -->
<div id="perfils" class="window">
  <h2>Perfils</h2>
</div>

<!-- MODAL -->
<div id="modal">
  <span class="close-btn" onclick="closeModal()">✕</span>
  <img id="modalImg">
</div>

<script>
// DADOS
const imagens = [
{
  img: "https://xatimg.com/image/LhPTjinBD63k.png",
  video: "https://www.w3schools.com/html/mov_bbb.mp4"
},
{
  img: "https://xatimg.com/image/jEluPHc8kDBS.png",
  video: "https://www.w3schools.com/html/movie.mp4"
},
{
  img: "https://xatimg.com/image/M5KeuOtU2NpC.png",
  video: "https://www.w3schools.com/html/mov_bbb.mp4"
},
{
  img: "https://xatimg.com/image/4jN5TkdSc7x2.png",
  video: "https://www.w3schools.com/html/movie.mp4"
}
];

// RENDER
function renderImages(list){
  const container = document.getElementById("netflixList");
  container.innerHTML = "";

  let favs = JSON.parse(localStorage.getItem("favs")) || [];

  list.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    let timer;

    const img = document.createElement("img");
    img.src = item.img;

    const video = document.createElement("video");
    video.src = item.video;
    video.muted = true;
    video.loop = true;

    img.onclick = () => openModal(item.img);

    card.addEventListener("mouseenter", () => {
      timer = setTimeout(() => {
        card.classList.add("expand", "playing");
        video.currentTime = 0;
        video.play();
      }, 400);
    });

    card.addEventListener("mouseleave", () => {
      clearTimeout(timer);
      card.classList.remove("expand", "playing");
      video.pause();
    });

    const btn = document.createElement("button");
    btn.className = "fav-btn";
    btn.innerText = "❤";

    if(favs.includes(item.img)) btn.classList.add("active");

    btn.onclick = (e) => {
      e.stopPropagation();
      toggleFav(btn, item.img);
    };

    card.appendChild(img);
    card.appendChild(video);
    card.appendChild(btn);
    container.appendChild(card);
  });
}
renderImages(imagens);

// BUSCA
document.getElementById("searchInput").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();
  renderImages(imagens.filter(i => i.img.toLowerCase().includes(val)));
});

// SCROLL
function scrollGallery(dir){
  document.getElementById("netflixList").scrollLeft += dir * 300;
}

// MODAL + DESTAQUE
function openModal(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=src;
  document.getElementById("highlightImg").src = src;
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

// FAVORITOS
function toggleFav(btn,img){
  let favs = JSON.parse(localStorage.getItem("favs")) || [];

  if(favs.includes(img)){
    favs = favs.filter(f=>f!==img);
    btn.classList.remove("active");
  } else {
    favs.push(img);
    btn.classList.add("active");
  }

  localStorage.setItem("favs", JSON.stringify(favs));
}

// JANELAS
function openWindow(id){
  document.querySelectorAll(".window").forEach(w=>w.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
